{% extends "base.html" %}

{% block content %}

<div class="container py-4">
    <h5 class="mb-3 text-center" style="color: var(--geo-dark-blue);">
        Select book
    </h5>
    <div class="list-group">
        {% for book in books %}
        <div class="list-group-item d-flex align-items-center justify-content-between py-2">
            <div class="d-flex align-items-center gap-2">

                {% if book.cover_url %}
                <img src="{{ book.cover_url }}"
                     style="height: 50px; width: 35px; object-fit: cover; border-radius: 4px;">
                {% else %}
                <div style="height: 50px; width: 35px; background: #eee;
                            display:flex; align-items:center; justify-content:center;
                            font-size: 10px;">
                    N/A
                </div>
                {% endif %}
                <div style="text-align: left;">
                    <div style="font-size: 0.85rem; font-weight: 600; color: var(--geo-dark-blue);">
                        {{ book.title }}
                    </div>
                    <div style="font-size: 0.75rem; color: gray;">
                        {{ book.author }} · {{ book.genre }}
                    </div>
                </div>
            </div>
            <form method="POST"
                  action="{{ url_for('confirm_add_book', username=current_user.name) }}"
                  class="m-0">

                <input type="hidden" name="title" value="{{ book.title }}">
                <input type="hidden" name="author" value="{{ book.author }}">
                <input type="hidden" name="isbn" value="{{ book.isbn }}">
                <input type="hidden" name="description" value="{{ book.description }}">
                <input type="hidden" name="genre" value="{{ book.genre }}">
                <input type="hidden" name="cover_url" value="{{ book.cover_url }}">

                <button class="btn btn-sm btn-geo-primary">
                    Add
                </button>

            </form>

        </div>

        {% endfor %}

    </div>
</div>
<div class="text-center mt-3">

    <a href="{{ url_for('add_book', username=current_user.name) }}"
       class="btn btn-sm"
       style="border: 1px solid var(--geo-pastel);
              color: var(--geo-dark-blue);
              border-radius: 8px;">
        Back
    </a>

</div>
{% endblock %}
