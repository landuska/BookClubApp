{% extends "base.html" %}

{% block content %}

<div class="container py-5 text-center">

    <h3 class="mb-4">Is this the book you meant?</h3>

    <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px; border-radius: 15px;">

        {% if book.cover_url %}
        <img src="{{ book.cover_url }}" class="mb-3 mx-auto" style="height: 180px;">
        {% else %}
                    <div class="d-flex align-items-center justify-content-center h-100 text-muted small">No Cover</div>
        {% endif %}

        <h5 class="fw-bold">{{ book.title }}</h5>
        <p class="text-muted">{{ book.author }}</p>
        <p class="small text-secondary">{{ book.genre }}</p>

        <form method="POST" action="{{ url_for('confirm_add_book', username=current_user.name) }}">
            <input type="hidden" name="title" value="{{ book.title }}">
            <input type="hidden" name="author" value="{{ book.author }}">
            <input type="hidden" name="isbn" value="{{ book.isbn }}">
            <input type="hidden" name="description" value="{{ book.description }}">
            <input type="hidden" name="genre" value="{{ book.genre }}">
            <input type="hidden" name="cover_url" value="{{ book.cover_url }}">

            <button class="btn btn-primary w-100 mt-3">
                Add this book
            </button>
        </form>

        <a href="{{ url_for('add_book', username=current_user.name) }}"
           class="btn btn-outline-secondary w-100 mt-2">
            Back
        </a>

    </div>

</div>

{% endblock %}
