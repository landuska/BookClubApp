{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="text-center col-md-6">

        <div class="mb-5">
            <h1 class="display-4 fw-bold">Book Club</h1>
            <p class="lead text-muted">
                The simplest way to track your library, rate your reads,
                and connect with book communities.
            </p>
        </div>

        <div class="card shadow-sm border-0 p-4 bg-light">
            <h5 class="mb-4">Sign In to Your Account</h5>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Email address" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="mt-3">
                <small>New user? <a href="/register" class="text-decoration-none">Create an account</a></small>
            </div>
        </div>

    </div>
</div>
{% endblock %}
