{% extends "base.html" %}

{% block title %}Profile | {{ username }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0" style="border-radius: 15px;">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <div class="rounded-circle bg-primary d-inline-flex align-items-center justify-content-center text-white shadow-sm"
                             style="width: 100px; height: 100px; font-size: 2.5rem; font-weight: bold;">
                            {{ username[0] | upper }}
                        </div>
                    </div>

                    <h1 class="fw-bold">Welcome, {{username}}!</h1>
                    <p class="text-muted">This is your personal BookClub dashboard.</p>

                    <hr class="my-4" style="opacity: 0.1;">

                    <div class="mt-4 d-flex gap-2 justify-content-center">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary px-4">Back to Home</a>
                        <a href="{{ url_for('logout', username=current_user.name) }}" class="btn btn-danger px-4">Log Out</a>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <h4 class="fw-bold mb-3">Your Book Shelf</h4>
                <div class="card border-0 shadow-sm p-4 text-center text-muted" style="border-radius: 15px;">
                    <p>You haven't added any books yet.</p>
                    <a href="{{ url_for('add_book', username=current_user.name) }}" class="btn btn-sm btn-primary align-self-center">Add Book</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
